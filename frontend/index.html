<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Trufa Store</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #2b0f0f, #4b1d1d, #6d2c2c);
            padding: 40px 20px;
            color: white;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
            font-size: 50px;
            color: #ffe6c7;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.4);
        }

        .container {
            max-width: 1200px;
            margin: auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
            gap: 30px;
        }

        .card {
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.35);
            border: 1px solid rgba(255,255,255,0.15);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        h2 {
            margin-bottom: 20px;
            color: #ffe6c7;
            font-size: 28px;
        }

        h3 {
            margin-top: 25px;
            margin-bottom: 15px;
            color: #fff2de;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            background: rgba(255,255,255,0.92);
            color: #333;
            outline: none;
        }

        input:focus {
            box-shadow: 0 0 10px rgba(255,255,255,0.4);
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #ffb347;
            color: #3b1d0f;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #ffd089;
            transform: scale(1.02);
        }

        ul {
            list-style: none;
        }

        li {
            background: rgba(255,255,255,0.16);
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 12px;
            border-left: 5px solid #ffb347;
            color: white;
        }

        #resultadoVenda {
            background: rgba(255,255,255,0.16);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
        }

        @media(max-width: 700px) {

            .container {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 36px;
            }
        }
    </style>
</head>

<body>

    <h1>Trufa Store</h1>

    <div class="container">

        <!-- PRODUTOS -->
        <div class="card">

            <h2>Criar Produto</h2>

            <input id="nome" placeholder="Nome do produto">

            <input id="preco" type="number" placeholder="Preço">

            <input id="estoque" type="number" placeholder="Estoque">

            <button onclick="criarProduto()">
                Salvar Produto
            </button>

            <h3>Lista de Produtos</h3>

            <ul id="listaProdutos"></ul>

        </div>

        <!-- VENDAS -->
        <div class="card">

            <h2>Criar Venda</h2>

            <input id="produtoId" type="number" placeholder="ID do Produto">

            <input id="quantidade" type="number" placeholder="Quantidade">

            <button onclick="criarVenda()">
                Criar Venda
            </button>

            <h3>Resultado</h3>

            <p id="resultadoVenda">
                Nenhuma venda realizada.
            </p>

        </div>

    </div>

    <script>

        const API = "http://localhost:8080";

        // ================= PRODUTO =================

        async function criarProduto() {

            const nome = document.getElementById("nome").value;
            const preco = parseFloat(document.getElementById("preco").value);
            const estoque = parseInt(document.getElementById("estoque").value);

            if (!nome || isNaN(preco) || isNaN(estoque)) {

                alert("Preencha todos os campos corretamente!");
                return;
            }

            try {

                const res = await fetch(API + "/produtos", {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({
                        nome,
                        preco,
                        estoque
                    })
                });

                if (!res.ok) {
                    throw new Error("Erro ao criar produto");
                }

                alert("✅ Produto criado com sucesso!");

                // limpa campos
                document.getElementById("nome").value = "";
                document.getElementById("preco").value = "";
                document.getElementById("estoque").value = "";

                // atualiza lista
                await listarProdutos();

            } catch (erro) {

                console.log(erro);

                alert("❌ Erro ao criar produto.");
            }
        }

        async function listarProdutos() {

            try {

                const resposta = await fetch(API + "/produtos");

                if (!resposta.ok) {
                    throw new Error("Erro ao buscar produtos");
                }

                const produtos = await resposta.json();

                const lista = document.getElementById("listaProdutos");

                lista.innerHTML = "";

                produtos.forEach(produto => {

                    const li = document.createElement("li");

                    li.innerHTML = `
                        <strong>ID:</strong> ${produto.id}<br>
                        <strong>Produto:</strong> ${produto.nome}<br>
                        <strong>Preço:</strong> R$ ${produto.preco}<br>
                        <strong>Estoque:</strong> ${produto.estoque}
                    `;

                    lista.appendChild(li);
                });

            } catch (erro) {

                console.log(erro);

                alert("❌ Erro ao listar produtos.");
            }
        }

        // ================= VENDA =================

        async function criarVenda() {

            const produtoId =
                parseInt(document.getElementById("produtoId").value);

            const quantidade =
                parseInt(document.getElementById("quantidade").value);

            if (isNaN(produtoId) || isNaN(quantidade)) {

                alert("Preencha os dados da venda corretamente!");
                return;
            }

            try {

                const res = await fetch(API + "/vendas", {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({

                        itens: [
                            {
                                quantidade: quantidade,
                                produto: {
                                    id: produtoId
                                }
                            }
                        ]
                    })
                });

                if (res.ok) {

                    document.getElementById("resultadoVenda").innerText =
                        "✅ Venda realizada com sucesso!";

                } else {

                    document.getElementById("resultadoVenda").innerText =
                        "❌ Erro ao realizar venda.";
                }

                document.getElementById("produtoId").value = "";
                document.getElementById("quantidade").value = "";

            } catch (erro) {

                console.log(erro);

                document.getElementById("resultadoVenda").innerText =
                    "❌ Erro ao conectar com o servidor.";
            }
        }

        // ================= INICIAL =================

        listarProdutos();

    </script>

</body>

</html>
